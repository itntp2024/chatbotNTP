<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/logo.png" type="image/png">
    <title>Chat Assistant</title>
    <style>
        /* Reset dan Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* MODIFIED GRADIENT */
            background: linear-gradient(135deg, #c0352c 0%, #0a4d85 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Login Styles */
        .login-container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .login-title {
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e1e1e1;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s ease;
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            /* MODIFIED FOCUS COLOR */
            border-color: #0a4d85;
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            /* MODIFIED GRADIENT */
            background: linear-gradient(135deg, #c0352c 0%, #0a4d85 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .login-btn:hover {
            transform: translateY(-2px);
        }

        .error-message {
            color: #e74c3c; /* Standard error red, distinct from new theme */
            margin-top: 10px;
            font-size: 14px;
        }

        .demo-accounts {
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            text-align: left;
            font-size: 12px;
        }

        .demo-accounts h4 {
            margin-bottom: 10px;
            color: #333;
        }

        .demo-accounts p {
            margin: 5px 0;
            color: #666;
        }

        /* Chat Styles */
        .chat-container {
            position: relative;
            display: none; /* Initially hidden */
            width: 100%;
            max-width: 800px;
            height: 90vh;
            background: white;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            flex-direction: column;
        }

        .chat-container::before {
            content: "";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-image: url('/logo.png');
            background-size: 200px;
            background-repeat: no-repeat;
            width: 200px;
            height: 200px;
            pointer-events: none; /* Agar tidak mengganggu klik */
            z-index: 0;
        }

        .chat-container > * {
            position: relative;
            z-index: 1;
        }

        .chat-header {
            /* MODIFIED GRADIENT */
            background: linear-gradient(135deg, #c0352c 0%, #0a4d85 100%);
            color: white;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-header h2 {
            font-size: 20px;
            font-weight: 600;
        }

        .logout-btn {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s ease;
        }

        .logout-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background: #f8f9fa;
        }

        .message {
            margin-bottom: 15px;
            display: flex;
            align-items: flex-end;
        }

        .message.user {
            justify-content: flex-end;
        }

        .message.bot {
            justify-content: flex-start;
        }

        .message-bubble {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 18px;
            word-wrap: break-word;
            animation: fadeIn 0.3s ease;
        }

        .message.user .message-bubble {
            /* MODIFIED GRADIENT */
            background: linear-gradient(135deg, #c0352c 0%, #0a4d85 100%);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.bot .message-bubble {
            background: white;
            color: #333;
            border: 1px solid #e1e1e1;
            border-bottom-left-radius: 4px;
        }

        .message-time {
            font-size: 11px;
            color: #999;
            margin: 0 8px;
        }

        .chat-input {
            padding: 20px;
            background: white;
            border-top: 1px solid #e1e1e1;
            display: flex;
            gap: 10px;
        }

        .chat-input input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e1e1e1;
            border-radius: 25px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s ease;
        }

        .chat-input input:focus {
            /* MODIFIED FOCUS COLOR */
            border-color: #0a4d85;
        }

        .send-btn {
            /* MODIFIED GRADIENT */
            background: linear-gradient(135deg, #c0352c 0%, #0a4d85 100%);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.2s ease;
        }

        .send-btn:hover {
            transform: scale(1.05);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .login-container {
                margin: 20px;
                padding: 30px 20px;
            }

            .chat-container {
                height: 100vh;
                border-radius: 0;
                margin: 0;
                max-width: 100%; /* Full width on mobile */
            }

            .message-bubble {
                max-width: 85%;
            }
        }

        /* Typing Indicator */
        .typing-indicator {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            background: white;
            border: 1px solid #e1e1e1;
            border-radius: 18px;
            border-bottom-left-radius: 4px;
            max-width: 70px; /* Adjusted for dot size */
            min-width: 60px; /* Ensure it doesn't collapse too much */
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #999;
            margin: 0 2px;
            animation: typing 1.4s infinite;
        }

        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-8px); /* Adjusted bounce height */ }
        }
    </style>
</head>

            // === KEUANGAN & PAYROLL (UMUM KARYAWAN) ===
            {
                keywords: ['gaji', 'payroll', 'slip gaji', 'tunjangan', 'kapan gajian'],
                answer: "Informasi gaji, tunjangan, dan slip gaji dapat diakses melalui portal karyawan. Gaji biasanya ditransfer setiap tanggal 25 atau hari kerja terakhir sebelum tanggal 25. Untuk pertanyaan detail, hubungi bagian Payroll/Finance di ext. 301."
            },
            {
                keywords: ['cuti tahunan', 'izin sakit', 'pengajuan leave', 'jatah libur'],
                answer: "Pengajuan cuti tahunan, izin sakit, atau izin lainnya dilakukan melalui portal karyawan atau form yang tersedia di HRD. Pastikan pengajuan dilakukan sesuai prosedur dan batas waktu yang ditetapkan. Jatah cuti tahunan adalah 12 hari setelah masa kerja 1 tahun."
            },
            {
                keywords: ['reimbursement bensin', 'klaim biaya operasional', 'penggantian biaya transport', 'uang makan lapangan'],
                answer: "Untuk reimbursement biaya operasional lapangan (transport, bensin, dll), kumpulkan bukti transaksi (struk, nota) yang sah dan ajukan melalui form klaim ke bagian Finance. Pastikan sesuai dengan plafon dan kebijakan perusahaan. Proses klaim biasanya [X] hari kerja."
            },

            // === FASILITAS KANTOR (UMUM KARYAWAN) ===
            {
                keywords: ['parkir motor', 'parkir mobil', 'tempat parkir karyawan'],
                answer: "Fasilitas parkir tersedia di area belakang perusahaan. Pastikan kendaraan Anda terdaftar dan menggunakan stiker parkir karyawan. Jaga keamanan barang bawaan Anda."
            },
            {
                keywords: ['kantin', 'tempat makan siang', 'pesan makan', 'fasilitas pantry'],
                answer: "Kantin atau pantry karyawan tersedia di [Lokasi Kantin/Pantry]. Mohon jaga kebersihan dan ketertiban bersama. Untuk pemesanan makan khusus (misal: rapat), hubungi GA."
            },
            {
                keywords: ['ruang meeting', 'booking ruangan rapat', 'pinjam ruang meeting'],
                answer: "Booking ruang meeting dilakukan melalui [Sistem Booking/Kontak GA] minimal [Waktu, misal: 1 hari] sebelumnya. Pastikan menginformasikan jumlah peserta dan kebutuhan peralatan (proyektor, dll)."
            },

            // === KEAMANAN KANTOR (UMUM KARYAWAN) ===
            {
                keywords: ['kartu akses hilang', 'id card rusak', 'lupa bawa kartu karyawan'],
                answer: "Kartu akses/ID Card karyawan wajib dibawa dan digunakan. Jika hilang atau rusak, segera laporkan ke bagian Security atau HRD untuk pemblokiran dan pembuatan kartu baru (mungkin dikenakan biaya). Jika lupa membawa, lapor ke Security untuk izin masuk sementara."
            },
            {
                keywords: ['nomor security', 'kontak keamanan', 'lapor satpam', 'keadaan darurat kantor'],
                answer: "Tim Security bertugas 24/7. Untuk laporan keamanan atau keadaan darurat di area kantor, hubungi pos Security di lobby atau ext. 911 (internal)."
            },

            // === TRAINING & DEVELOPMENT (UMUM KARYAWAN) ===
            {
                keywords: ['training baru', 'pelatihan karyawan', 'jadwal training', 'pengembangan diri'],
                answer: "Informasi program pelatihan internal (produk, sistem, soft skills, legal) dan eksternal akan diumumkan oleh HRD. Anda juga bisa mengajukan kebutuhan training kepada atasan Anda untuk pengembangan karir."
            },
            {
                keywords: ['promosi jabatan', 'naik pangkat', 'jenjang karir', 'peluang karir internal'],
                answer: "Perusahaan mendukung pengembangan karir karyawan. Peluang promosi didasarkan pada kinerja, kompetensi, dan kebutuhan organisasi. Diskusikan rencana karir Anda dengan atasan dan HRD."
            }
        ];

        // State Management
        let currentUser = null;
        let isTyping = false;
        let sessionTimeout = null;
        let lastActivity = Date.now();
        const SESSION_DURATION = 15 * 60 * 1000; // 15 minutes in milliseconds
        const CHAT_HISTORY_KEY = 'chatbotMessageHistory';


        // DOM Elements
        const loginContainer = document.getElementById('loginContainer');
        const chatContainer = document.getElementById('chatContainer');
        const loginForm = document.getElementById('loginForm');
        const errorMessage = document.getElementById('errorMessage');
        const chatMessages = document.getElementById('chatMessages');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        const userInfo = document.getElementById('userInfo');
        const welcomeTime = document.getElementById('welcomeTime'); // ID for the initial welcome message's time

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            checkExistingSession();
            const initialWelcomeTimeEl = document.getElementById('welcomeTime');
            if (initialWelcomeTimeEl) {
                 initialWelcomeTimeEl.textContent = getCurrentTime();
            }
            
            loginForm.addEventListener('submit', handleLogin);
            
            messageInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });
            
            sendBtn.addEventListener('click', sendMessage);
            logoutBtn.addEventListener('click', handleLogout);
            
            trackUserActivity();
            
            const observer = new MutationObserver(function() {
                if (chatContainer.style.display === 'flex') {
                    messageInput.focus();
                }
            });
            observer.observe(chatContainer, { attributes: true, attributeFilter: ['style'] });
        });

        function checkExistingSession() {
            const sessionData = sessionStorage.getItem('chatbotSession');
            if (sessionData) {
                try {
                    const session = JSON.parse(sessionData);
                    const now = Date.now();
                    
                    if (now - session.lastActivity < SESSION_DURATION) {
                        currentUser = session.user;
                        lastActivity = session.lastActivity; 
                        showChatInterface(); 
                        loadChatHistory();   
                        startSessionTimer(); 
                        return;
                    } else {
                        sessionStorage.removeItem('chatbotSession');
                        sessionStorage.removeItem(CHAT_HISTORY_KEY); 
                    }
                } catch (e) {
                    console.error("Error parsing session data:", e);
                    sessionStorage.removeItem('chatbotSession');
                    sessionStorage.removeItem(CHAT_HISTORY_KEY); 
                }
            }
        }
        
        function loadChatHistory() {
            const historyData = sessionStorage.getItem(CHAT_HISTORY_KEY);
            if (historyData) {
                try {
                    const history = JSON.parse(historyData);
                    if (history && history.length > 0) {
                        const existingMessages = chatMessages.querySelectorAll('.message');
                        existingMessages.forEach((msg, index) => {
                            if (index > 0) { 
                                msg.remove();
                            }
                        });

                        history.forEach(msgData => {
                            addMessageToDOM(msgData.text, msgData.sender, msgData.time);
                        });
                    }
                } catch (e) {
                    console.error("Error parsing chat history:", e);
                    sessionStorage.removeItem(CHAT_HISTORY_KEY); // Clear corrupted history
                }
            }
            scrollToBottom();
        }


        function saveSession() {
            if (currentUser) {
                const sessionData = {
                    user: currentUser,
                    lastActivity: lastActivity
                };
                sessionStorage.setItem('chatbotSession', JSON.stringify(sessionData));
            }
        }

        function updateActivity() {
            lastActivity = Date.now();
            saveSession();
            resetSessionTimer();
        }

        function trackUserActivity() {
            const events = ['mousedown', 'mousemove', 'keypress', 'scroll', 'touchstart', 'click'];
            events.forEach(event => {
                document.addEventListener(event, function() {
                    if (currentUser) { 
                        updateActivity();
                    }
                }, true);
            });
        }

        function startSessionTimer() {
            resetSessionTimer(); 
        }

        function resetSessionTimer() {
            if (sessionTimeout) {
                clearTimeout(sessionTimeout);
            }
            
            if (currentUser) { 
                const timeRemaining = SESSION_DURATION - (Date.now() - lastActivity);
                
                if (timeRemaining > 0) {
                    sessionTimeout = setTimeout(() => {
                        handleSessionTimeout();
                    }, timeRemaining);
                } else {
                    handleSessionTimeout();
                }
            }
        }

        function handleSessionTimeout() {
            if (currentUser) { 
                 alert('Sesi Anda telah berakhir karena tidak aktif selama 15 menit. Silakan login kembali.');
                 handleLogout();
            }
        }

        function handleLogin(e) {
            e.preventDefault();
            
            const userType = document.getElementById('userType').value;
            const username = document.getElementById('username').value.toLowerCase();
            const password = document.getElementById('password').value;
            
            errorMessage.textContent = '';
            
            if (accounts[userType] && accounts[userType].username === username && accounts[userType].password === password) {
                currentUser = {
                    type: userType,
                    username: username,
                    loginTime: new Date()
                };
                lastActivity = Date.now(); 
                sessionStorage.removeItem(CHAT_HISTORY_KEY); 
                saveSession(); 
                showChatInterface();
                startSessionTimer(); 
            } else {
                errorMessage.textContent = 'Username atau password salah!';
                document.getElementById('password').value = '';
            }
        }

        function showChatInterface() {
            loginContainer.style.display = 'none';
            chatContainer.style.display = 'flex';
            
            const userTypeDisplay = currentUser.type.charAt(0).toUpperCase() + currentUser.type.slice(1);
            userInfo.textContent = `${userTypeDisplay}: ${currentUser.username}`;
            
            const existingMessages = chatMessages.querySelectorAll('.message');
            if (existingMessages.length === 1) { 
                 const initialWelcomeTimeEl = document.getElementById('welcomeTime');
                 if (initialWelcomeTimeEl) {
                    initialWelcomeTimeEl.textContent = getCurrentTime();
                 }
            }

            setTimeout(() => messageInput.focus(), 100);
        }

        function handleLogout() {
            if (sessionTimeout) {
                clearTimeout(sessionTimeout);
                sessionTimeout = null;
            }
            
            currentUser = null;
            lastActivity = 0; 
            sessionStorage.removeItem('chatbotSession');
            sessionStorage.removeItem(CHAT_HISTORY_KEY); 
            
            chatContainer.style.display = 'none';
            loginContainer.style.display = 'block';
            
            loginForm.reset();
            errorMessage.textContent = '';
            
            const messages = chatMessages.querySelectorAll('.message');
            messages.forEach((msg, index) => {
                if (index > 0) { 
                    msg.remove();
                }
            });
            const initialWelcomeTimeEl = document.getElementById('welcomeTime');
            if (initialWelcomeTimeEl) {
                 initialWelcomeTimeEl.textContent = getCurrentTime();
            }
        }

        function sendMessage() {
            const messageText = messageInput.value.trim();
            if (!messageText || isTyping) return;
            
            updateActivity(); 
            
            addMessageToChat(messageText, 'user'); 
            messageInput.value = '';
            
            showTypingIndicator();
            
            setTimeout(() => {
                const response = generateResponse(messageText);
                hideTypingIndicator();
                addMessageToChat(response, 'bot'); 
            }, 1000 + Math.random() * 1000);
        }

        function addMessageToChat(text, sender) {
            const time = getCurrentTime();
            addMessageToDOM(text, sender, time);

            const historyData = sessionStorage.getItem(CHAT_HISTORY_KEY);
            let history = [];
            if (historyData) {
                try {
                    history = JSON.parse(historyData);
                } catch (e) {
                    console.error("Error parsing chat history for saving:", e);
                    history = []; // Reset if corrupted
                }
            }
            history.push({ text, sender, time });
            sessionStorage.setItem(CHAT_HISTORY_KEY, JSON.stringify(history));
        }
        
        function addMessageToDOM(text, sender, time) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;
            
            const bubble = document.createElement('div');
            bubble.className = 'message-bubble';
            bubble.textContent = text; 

            const timeDiv = document.createElement('div');
            timeDiv.className = 'message-time';
            timeDiv.textContent = time;
            
            messageDiv.appendChild(bubble);
            messageDiv.appendChild(timeDiv);
            
            chatMessages.appendChild(messageDiv);
            scrollToBottom();
        }


        function showTypingIndicator() {
            if (isTyping) return;
            
            isTyping = true;
            sendBtn.disabled = true; 
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message bot';
            typingDiv.id = 'typingIndicator';
            
            typingDiv.innerHTML = `
                <div class="typing-indicator">
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                </div>
            `;
            
            chatMessages.appendChild(typingDiv);
            scrollToBottom();
        }

        function hideTypingIndicator() {
            const typingIndicator = document.getElementById('typingIndicator');
            if (typingIndicator) {
                typingIndicator.remove();
            }
            isTyping = false;
            sendBtn.disabled = false; 
        }
        
        function generateResponse(userMessage) {
            const cleanedMessage = userMessage.toLowerCase().trim()
                .replace(/[.,\/#!$%\^&\*;:{}=\-_`~()?]/g, "") 
                .replace(/\s+/g, ' ') 
                .trim();

            if (!cleanedMessage) {
                 return "Maaf, saya tidak menerima pesan kosong. Ada yang bisa saya bantu?";
            }
            
            let bestMatch = null;
            let highestScore = 0;
            let bestKeywordLength = 0; // For tie-breaking
            
            qaPairs.forEach(qa => {
                qa.keywords.forEach(keyword => {
                    const currentKeyword = keyword.toLowerCase().trim();
                    const score = calculateSimilarity(cleanedMessage, currentKeyword);
                    
                    if (score > highestScore && score >= 0.35) { 
                        highestScore = score;
                        bestMatch = qa.answer;
                        bestKeywordLength = currentKeyword.length;
                    } else if (score === highestScore && score >= 0.35) {
                        if (currentKeyword.length > bestKeywordLength) {
                            bestMatch = qa.answer; 
                            bestKeywordLength = currentKeyword.length;
                        }
                    }
                });
            });
            
            return bestMatch || "Maaf, saya belum mengerti pertanyaan itu. Bisa coba tanyakan dengan kata kunci yang berbeda? Atau hubungi HR/Supervisor Anda untuk bantuan lebih lanjut.";
        }

        function calculateSimilarity(str1, str2) { 
            if (!str1 || !str2) return 0; 

            const s1 = str1; 
            const s2 = str2; 

            if (s1 === s2) return 1.0; 

            const words1 = s1.split(' ');
            const words2 = s2.split(' ');

            if (words2.length > 1 && s1.includes(s2)) {
                return 0.92 + (s2.length / s1.length) * 0.03; 
            }

            if (words2.length === 1 && words1.includes(s2)) {
                return 0.90;
            }
            
            if (words2.length > 1) {
                const allKeywordWordsPresent = words2.every(word => words1.includes(word));
                if (allKeywordWordsPresent) {
                    return 0.80 + (words2.length / words1.length) * 0.08; 
                }
            }

            if (s1.includes(s2)) {
                if (s2.length <= 3 && !words1.includes(s2)) { // Check if s2 is a whole word
                    let isSubstringOfSomeWord = words1.some(w1 => w1.includes(s2) && w1 !== s2);
                    if (isSubstringOfSomeWord) return 0.35; 
                }
                return 0.70 + (s2.length / s1.length) * 0.1; 
            }
            
            if (s2.includes(s1)) {
                 return 0.65 + (s1.length / s2.length) * 0.1;
            }

            const commonWords = words1.filter(word => words2.includes(word));
            if (commonWords.length > 0) {
                let score = (commonWords.length * 2) / (words1.length + words2.length);
                if (commonWords.some(cw => words2.includes(cw) && cw.length > 3)) {
                    score += 0.1;
                }
                return Math.min(0.75, score); 
            }

            const maxLength = Math.max(s1.length, s2.length);
            if (maxLength === 0) return 0;

            let edits = 0;
            const s1Array = s1.split(''); // Corrected variable name from previous context
            const s2Array = s2.split(''); // Corrected variable name from previous context
            const distanceMatrix = Array(s2Array.length + 1).fill(null).map(() =>
            Array(s1Array.length + 1).fill(null));

            for (let i = 0; i <= s1Array.length; i += 1) {
                distanceMatrix[0][i] = i;
            }
            for (let j = 0; j <= s2Array.length; j += 1) {
                distanceMatrix[j][0] = j;
            }

            for (let j = 1; j <= s2Array.length; j += 1) {
                for (let i = 1; i <= s1Array.length; i += 1) {
                    const indicator = s1Array[i - 1] === s2Array[j - 1] ? 0 : 1;
                    distanceMatrix[j][i] = Math.min(
                        distanceMatrix[j][i - 1] + 1, 
                        distanceMatrix[j - 1][i] + 1, 
                        distanceMatrix[j - 1][i - 1] + indicator, 
                    );
                }
            }
            edits = distanceMatrix[s2Array.length][s1Array.length];
            let similarity = 1.0 - (edits / maxLength);
            
            if (Math.abs(s1.length - s2.length) > maxLength / 1.5) { 
                similarity -= 0.25;
            }
            return Math.max(0, similarity * 0.6); 
        }


        function getCurrentTime() {
            return new Date().toLocaleTimeString('id-ID', { 
                hour: '2-digit', 
                minute: '2-digit' 
            });
        }

        function scrollToBottom() {
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }
    </script>
